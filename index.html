<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Journal Taj</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#1f6feb" />

  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Journal Taj" />
  <link rel="apple-touch-icon" href="./icon-180.png" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>Journal Taj</h1>
    <div class="header-actions">
      <button id="authBtn" class="ghost-btn" type="button">Sign in</button>
      <button id="newBtn" class="primary" aria-label="New entry">+ New</button>
    </div>
  </header>

  <main>
    <div class="searchbar">
      <input id="searchInput" type="search" placeholder="Search entries..." />
    </div>
    <ul id="list" class="list"></ul>
    <p id="empty" class="empty">No entries yet. Tap <strong>+ New</strong> to create one.</p>
  </main>

  <!-- Editor overlay -->
  <div id="editor" class="editor" hidden>
    <div class="editor-bar">
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn" class="primary">Save</button>
    </div>

    <div class="editor-scroll">
      <input id="titleInput" class="title-input" type="text" placeholder="Title" />
      <input id="dateInput" class="date-input" type="date" />
      <div id="moodPicker" class="mood-picker"></div>
      <textarea id="bodyInput" class="body-input" placeholder="Write your entry..."></textarea>

      <div id="attachments" class="attachments"></div>

      <button id="attachBtn" class="attach-btn" type="button">📎 Add photo / video / file</button>
      <input id="fileInput" type="file" multiple hidden />

      <button id="deleteBtn" class="danger" type="button" hidden>Delete entry</button>
    </div>
  </div>

  <!-- Sign-in modal (email + password — works inside the installed app) -->
  <div id="authModal" class="auth-modal" hidden>
    <div class="auth-box">
      <h2>Sync your journal</h2>
      <p class="auth-hint">Use your email and a password made just for this app. Tap "Create account" the first time, then "Sign in" after that.</p>
      <input id="authEmail" type="email" placeholder="Email" autocomplete="username" />
      <input id="authPass" type="password" placeholder="Password (min 6 characters)" autocomplete="current-password" />
      <p id="authError" class="auth-error" hidden></p>
      <button id="authSignIn" class="primary" type="button">Sign in</button>
      <button id="authCreate" type="button">Create account</button>
      <button id="authCancel" type="button">Cancel</button>
    </div>
  </div>

  <script src="./app.js"></script>
  <script type="module" src="./sync.js"></script>
</body>
</html>
